<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plotio | VN Maker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hero-bg {
            background-image: url('https://i.ibb.co.com/8Lz1J6xm/Screenshot-2026-07-17-20-13-17-547-com-android-chrome.jpg');
            background-size: cover;
            background-position: center;
        }
    </style>
</head>
<body class="bg-[#0b071e] text-white min-h-screen hero-bg">
    <!-- Navbar -->
    <nav class="flex justify-between items-center p-6">
        <div class="flex items-center space-x-2">
            <h1 class="text-2xl font-black tracking-tighter">PLOTIO</h1>
            <span class="text-[10px] text-cyan-400 font-bold uppercase tracking-widest border border-cyan-400/30 px-2 py-0.5 rounded-lg">VN Maker</span>
        </div>
        <button onclick="window.location.href='auth/auth.html'" class="bg-pink-600 hover:bg-pink-500 text-xs font-bold px-5 py-2.5 rounded-full transition-all shadow-lg shadow-pink-900/20">
            Sign In / Register
        </button>
    </nav>

    <!-- Hero Content -->
    <main class="flex items-center justify-center min-h-[80vh] p-4">
        <div class="bg-black/70 backdrop-blur-lg border border-white/5 p-8 rounded-3xl max-w-sm text-center space-y-6 shadow-2xl">
            <h2 class="text-4xl font-extrabold leading-tight">Build Your Own Visual Novel</h2>
            <p class="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-cyan-400">Without A Single Line Of Code.</p>
            <p class="text-slate-300 text-sm leading-relaxed">Bring your stories to life. Design characters, map complex branching choices, and publish your interactive masterpieces directly from your browser.</p>
            <button onclick="window.location.href='auth/auth.html'" class="w-full bg-gradient-to-r from-pink-600 to-purple-600 font-bold py-4 rounded-xl shadow-lg shadow-pink-900/50 transition-all transform hover:scale-105 active:scale-95">
                Start Creating For Free →
            </button>
        </div>
    </main>
</body>
</html>
