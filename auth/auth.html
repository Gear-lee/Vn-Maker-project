<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth | Plotio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../config.js"></script>
</head>
<body class="bg-[#0b071e] text-white flex items-center justify-center min-h-screen p-6">
    <div class="bg-black/40 backdrop-blur-xl border border-white/10 p-8 rounded-3xl w-full max-w-sm shadow-2xl space-y-6">
        <h2 id="title" class="text-3xl font-black text-center">Sign In</h2>
        <input type="email" id="email" placeholder="Email" class="w-full bg-slate-900 border border-white/10 p-4 rounded-xl">
        <input type="password" id="password" placeholder="Password" class="w-full bg-slate-900 border border-white/10 p-4 rounded-xl">
        <button id="mainBtn" onclick="handleAuth()" class="w-full bg-pink-600 py-4 rounded-xl font-bold">Sign In</button>
    </div>
    <script>
        const supabase = supabase.createClient(window.SUPABASE_CONFIG.URL, window.SUPABASE_CONFIG.ANON_KEY);
        async function handleAuth() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            const { data, error } = await supabase.auth.signInWithPassword({ email, password });
            
            if (error) {
                alert("Gagal Login: " + error.message);
            } else {
                window.location.href = '/ui/dashboard.html';
            }
        }
    </script>
</body>
</html>
