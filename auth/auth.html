<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth | Plotio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../config.js"></script>
</head>
<body class="bg-[#0b071e] text-white flex items-center justify-center min-h-screen p-6">
    <div class="bg-black/40 backdrop-blur-xl border border-white/10 p-8 rounded-3xl w-full max-w-sm shadow-2xl space-y-6">
        <h2 id="formTitle" class="text-3xl font-black text-center">Sign In</h2>
        <input type="email" id="email" placeholder="Email Address" class="w-full bg-slate-900 border border-white/10 p-4 rounded-xl focus:border-pink-500 outline-none">
        <input type="password" id="password" placeholder="Password" class="w-full bg-slate-900 border border-white/10 p-4 rounded-xl focus:border-pink-500 outline-none">
        
        <button id="actionBtn" onclick="handleAuth()" class="w-full bg-pink-600 hover:bg-pink-500 py-4 rounded-xl font-bold transition-all">
            Sign In
        </button>
        
        <p class="text-center text-sm text-slate-400">
            <span id="toggleText">Don't have an account?</span>
            <button onclick="toggleMode()" class="text-pink-500 font-bold hover:underline ml-1">Register</button>
        </p>
    </div>

    <script>
        const supabaseClient = supabase.createClient(window.SUPABASE_CONFIG.URL, window.SUPABASE_CONFIG.ANON_KEY);
        let isLogin = true;

        function toggleMode() {
            isLogin = !isLogin;
            document.getElementById('formTitle').innerText = isLogin ? "Sign In" : "Register";
            document.getElementById('actionBtn').innerText = isLogin ? "Sign In" : "Register";
            document.getElementById('toggleText').innerText = isLogin ? "Don't have an account?" : "Already have an account?";
        }

        async function handleAuth() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (!email || !password) {
                alert("Email dan password wajib diisi.");
                return;
            }

            const actionBtn = document.getElementById('actionBtn');
            actionBtn.disabled = true;
            actionBtn.innerText = "Memproses...";

            if (isLogin) {
                const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
                if (error) {
                    alert("Login Failed: " + error.message);
                    actionBtn.disabled = false;
                    actionBtn.innerText = "Sign In";
                } else {
                    window.location.href = '/ui/dashboard.html';
                }
            } else {
                const { error } = await supabaseClient.auth.signUp({ email, password });
                if (error) {
                    alert("Registration Failed: " + error.message);
                    actionBtn.disabled = false;
                    actionBtn.innerText = "Register";
                } else {
                    const { error: loginError } = await supabaseClient.auth.signInWithPassword({ email, password });
                    if (loginError) {
                        alert("Auto-login failed: " + loginError.message);
                        actionBtn.disabled = false;
                        actionBtn.innerText = "Register";
                    } else {
                        window.location.href = '/ui/dashboard.html';
                    }
                }
            }
        }
    </script>
</body>
</html>
